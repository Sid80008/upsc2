services:
  - type: web
    name: upsc-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:////data/upsc.db
    disk:
      name: upsc-sqlite-data
      mountPath: /data
      sizeGB: 1
